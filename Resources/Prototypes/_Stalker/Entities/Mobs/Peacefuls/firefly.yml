# this seems like it was someones first yaml so im refactoring the entire thing
# assume nothing is as it once was

- type: entity
  id: FireflyBase
  name: firefly
  description: Some fireflies.
  abstract: true
  components:
  - type: Clickable
  - type: Sprite
    sprite: _Stalker/Mobs/Peacefuls/firefly.rsi
    drawdepth: Mobs
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.75
    sprintSpeedModifier: 0.75
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
  - type: RandomWalk
    maxSpeed: 3.5
    minSpeed: 0.5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
  - type: PointLight
    radius: 2
    energy: 1
    color: "#6cff82"
    castShadows: true
  - type: AmbientSound
    volume: -7
    range: 4
    sound:
      path: /Audio/_Stalker/Animals/firefly.ogg
  - type: TimedDespawn
    lifetime: 900


- type: entity
  id: FireflyGreen3
  parent: FireflyBase
  name: Светлячки
  description: Где тьма обладает всепоглощающей силой, светящиеся точки блеска привлекают внимание скитальцев.
  suffix: Stalker, Большой
  components:
  - type: Sprite
    sprite: _Stalker/Mobs/Peacefuls/firefly.rsi
    drawdepth: Mobs
    state: fireflygreen3

