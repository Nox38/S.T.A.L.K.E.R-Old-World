#Спавнеры
- type: entity
  name: Триггер Светлячков (3-7) (100%)
  id: FireFlyYellowTrigger
  parent: MarkerBase
  suffix: Stalker, КД 30 минут
  components:
    - type: ApproachTrigger
      # range: 20 # Stalker-TODO: These fields do not exist in this component!
      # minRange: 15
      # useMinRange: true
      # whitelist:
        # components:
          # - Dna
    - type: Sprite
      layers:
        - state: blue
        - sprite: _Stalker/Mobs/Peacefuls/firefly.rsi
          state: fireflyyellow3
        - state: ai
    - type: SpawnOnApproach
      prototypes:
        - FireflyYellow1
        - FireflyYellow2
        - FireflyYellow3
      minStartAction: 2100
      minAmount: 3
      maxAmount: 7
      maxOffset: 9
      minOffset: 3
      cooldown: 5400
      chance: 1
      restricted:
        - FireflyYellow1
        - FireflyYellow2
        - FireflyYellow3

