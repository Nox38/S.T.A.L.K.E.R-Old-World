- type: entity
  parent: ClothingScarfBase
  id: STClothingNeckFacescarfBlack
  name: чёрный лицевой шарф
  description: Уютный чёрный лицевой шарф, который позволит держать ваше лицо в тепле. Можно носить как на лице, так и на шее.
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/Neck/facescarfs/facescarf_black.rsi
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/Neck/facescarfs/facescarf_black.rsi
      slots: [ mask, neck ]
    - type: IdentityBlocker
      coverage: MOUTH

